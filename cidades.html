<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cidades - Oráculo de Viagens</title>
    <style>
        :root {
            --primary: #ff4b2b;
            --secondary: #ff9a44;
            --bg: #f4f7f6;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
        }

        /* Menu Lateral */
        nav {
            width: 280px;
            background: var(--white);
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            padding: 20px 0;
        }

        nav h2 {
            padding: 0 20px;
            color: var(--primary);
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .city-link {
            padding: 12px 20px;
            display: block;
            color: #555;
            text-decoration: none;
            transition: 0.3s;
            border-left: 4px solid transparent;
            cursor: pointer;
            font-weight: 500;
        }

        .city-link:hover, .city-link.active {
            background: #fff5f3;
            color: var(--primary);
            border-left-color: var(--primary);
        }

        /* Conteúdo Principal */
        main {
            margin-left: 280px;
            padding: 40px;
            width: 100%;
        }

        .city-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .city-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: #2d3436; font-size: 2.5rem; margin-bottom: 10px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-card span { display: block; color: #636e72; font-size: 0.9rem; }
        .stat-card strong { color: var(--primary); font-size: 1.2rem; }

        .info-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .info-box {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        ul { padding-left: 20px; }
        li { margin-bottom: 10px; color: #444; }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            nav { width: 100%; height: auto; position: relative; }
            main { margin-left: 0; padding: 20px; }
            .info-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav id="menu">
    <h2>Cidades</h2>
    <!-- Gerado via JS -->
</nav>

<main id="content">
    <a href="index.html" class="btn-back">← Voltar ao Início</a>
    <!-- Conteúdo das Cidades será inserido aqui -->
</main>

<script>
    const cidades = [
        { nome: "Araguari", estado: "MG", area: "2.729,5", popAbs: "117.808", densidade: "43,1", pontos: ["Cachoeira das Freiras", "Palácio dos Ferroviários", "Bosque John Kennedy", "Represa de Capim Branco", "Arquivo Histórico"], curios: ["Maior produtor de café do Triângulo Mineiro.", "Conhecida como a 'Cidade Sorriso'."] },
        { nome: "Uberlândia", estado: "MG", area: "4.115,2", popAbs: "713.232", densidade: "173,3", pontos: ["Parque do Sabiá", "Mercado Municipal", "Museu Municipal", "Teatro Municipal", "Cachoeira de Sucupira"], curios: ["Segundo maior mercado de logística do Brasil.", "Eleita várias vezes uma das melhores cidades para se viver."] },
        { nome: "Uberaba", estado: "MG", area: "4.523,9", popAbs: "337.846", densidade: "74,6", pontos: ["Peirópolis (Paleontologia)", "Memorial Chico Xavier", "Mercado Municipal", "Santuário da Medalha Milagrosa", "Igreja de São Domingos"], curios: ["Capital Mundial do Zebu.", "Cidade onde viveu e trabalhou Chico Xavier."] },
        { nome: "Araxá", estado: "MG", area: "1.164,3", popAbs: "111.691", densidade: "95,9", pontos: ["Grande Hotel Termas de Araxá", "Fonte Dona Beja", "Museu Calmon Barreto", "Cristo Redentor", "Parque Nacional da Serra da Canastra"], curios: ["Famosa por suas águas radioativas e lamas medicinais.", "Lar da lendária personagem Dona Beja."] },
        { nome: "Belo Horizonte", estado: "MG", area: "331,4", popAbs: "2.315.560", densidade: "6.987,1", pontos: ["Conjunto da Pampulha", "Praça da Liberdade", "Mercado Central", "Estádio Mineirão", "Mirante das Mangabeiras"], curios: ["Capital mundial dos botecos.", "Primeira cidade planejada do Brasil no período republicano."] },
        { nome: "Indianópolis", estado: "MG", area: "834,1", popAbs: "6.953", densidade: "8,3", pontos: ["Represa de Miranda", "Igreja Matriz", "Cachoeira do Salto", "Casarões Históricos", "Turismo Rural"], curios: ["Economia baseada na agricultura e energia elétrica.", "Cidade tranquila próxima a Uberlândia."] },
        { nome: "Tupaciguara", estado: "MG", area: "1.826,0", popAbs: "25.470", densidade: "13,9", pontos: ["Cachoeira do Rio Bonito", "Lago de Itumbiara", "Praça da Matriz", "Museu Local", "Clubes de Pesca"], curios: ["Nome de origem indígena que significa 'Terra da Mãe de Deus'.", "Famosa pelo carnaval de rua."] },
        { nome: "Ouro Preto", estado: "MG", area: "1.245,3", popAbs: "74.824", densidade: "60,1", pontos: ["Praça Tiradentes", "Museu da Inconfidência", "Igreja São Francisco de Assis", "Mina da Passagem", "Parque das Itacolomi"], curios: ["Primeira cidade brasileira declarada Patrimônio da Humanidade.", "Possui o maior conjunto homogêneo de arquitetura barroca."] },
        { nome: "Juiz de Fora", estado: "MG", area: "1.435,7", popAbs: "540.756", densidade: "376,6", pontos: ["Museu Mariano Procópio", "Morro do Imperador", "Parque da Lajinha", "Cine-Theatro Central", "Mirante de São Bernardo"], curios: ["Conhecida como a 'Manchester Mineira' pelo pioneirismo industrial.", "Teve a primeira usina hidrelétrica da América do Sul."] },
        { nome: "Itumbiara", estado: "GO", area: "2.461,3", popAbs: "107.970", densidade: "43,8", pontos: ["Rio Paranaíba", "Farol da Praça da República", "Beira Rio", "Kartódromo Internacional", "Catedral Santa Rita de Cássia"], curios: ["Porta de entrada do estado de Goiás.", "Destaque nacional na produção de grãos."] },
        { nome: "Balneário Piçarras", estado: "SC", area: "99,4", popAbs: "27.103", densidade: "272,6", pontos: ["Museu Oceanográfico Univali", "Ilha Feia", "Praia das Palmeiras", "Rio Piçarras", "Ponta do Jacques"], curios: ["Possui o maior museu oceanográfico da América Latina.", "Certificada com a Bandeira Azul de sustentabilidade."] },
        { nome: "Paraty", estado: "RJ", area: "925,1", popAbs: "43.784", densidade: "47,3", pontos: ["Centro Histórico", "Caminho do Ouro", "Saco do Mamanguá", "Alambiques de Cachaça", "Praia de Trindade"], curios: ["As ruas foram projetadas para serem alagadas pela maré alta.", "Sede da FLIP, uma das maiores festas literárias do mundo."] },
        { nome: "Brasília", estado: "DF", area: "5.760,7", popAbs: "2.817.068", densidade: "489,0", pontos: ["Catedral Metropolitana", "Congresso Nacional", "Pontão do Lago Sul", "Memorial JK", "Parque da Cidade"], curios: ["Construída em apenas 41 meses.", "Vista de cima, o Plano Piloto lembra o formato de um avião."] },
        { nome: "Curitiba", estado: "PR", area: "434,8", popAbs: "1.773.733", densidade: "4.079,4", pontos: ["Jardim Botânico", "Ópera de Arame", "Museu Oscar Niemeyer", "Parque Tanguá", "Torre Panorâmica"], curios: ["Referência mundial em planejamento urbano e reciclagem.", "Conhecida como a capital ecológica do Brasil."] },
        { nome: "Foz do Iguaçu", estado: "PR", area: "617,7", popAbs: "285.415", densidade: "462,0", pontos: ["Cataratas do Iguaçu", "Itaipu Binacional", "Parque das Aves", "Marco das Três Fronteiras", "Templo Budista"], curios: ["Faz fronteira com Paraguai e Argentina ao mesmo tempo.", "Abriga uma das Novas Sete Maravilhas da Natureza."] },
        { nome: "Registro", estado: "SP", area: "722,4", popAbs: "59.946", densidade: "83,0", pontos: ["KKKK (Centro Cultural)", "Praça Beira Rio", "Templo Budista Hongwanji", "Rio Ribeira de Iguape", "Mercado Municipal"], curios: ["Capital do Chá no Brasil.", "Forte influência da colonização japonesa."] },
        { nome: "Peruíbe", estado: "SP", area: "326,2", popAbs: "68.344", densidade: "209,5", pontos: ["Ruínas do Abarebebê", "Praia do Guaraú", "Estação Ecológica Juréia-Itatins", "Lamário Municipal", "Corredeiras do Perequê"], curios: ["Famosa por supostos avistamentos de OVNIs e turismo ufológico.", "Possui a lama negra com propriedades medicinais."] }
    ];

    const menu = document.getElementById('menu');
    const content = document.getElementById('content');

    cidades.forEach((cidade, index) => {
        // Criar Link no Menu
        const link = document.createElement('a');
        link.className = `city-link ${index === 0 ? 'active' : ''}`;
        link.innerText = cidade.nome;
        link.onclick = () => showCity(index);
        menu.appendChild(link);

        // Criar Section de Conteúdo
        const section = document.createElement('section');
        section.id = `city-${index}`;
        section.className = `city-section ${index === 0 ? 'active' : ''}`;
        
        section.innerHTML = `
            <h1>${cidade.nome} <small style="font-size: 1rem; color: #999;">(${cidade.estado})</small></h1>
            
            <div class="stats-grid">
                <div class="stat-card"><span>Área</span><strong>${cidade.area} km²</strong></div>
                <div class="stat-card"><span>Pop. Absoluta</span><strong>${cidade.popAbs} hab.</strong></div>
                <div class="stat-card"><span>Densidade (Pop. Relativa)</span><strong>${cidade.densidade} hab/km²</strong></div>
            </div>

            <div class="info-container">
                <div class="info-box">
                    <h3>📍 5 Pontos Turísticos</h3>
                    <ul>${cidade.pontos.map(p => `<li>${p}</li>`).join('')}</ul>
                </div>
                <div class="info-box">
                    <h3>💡 Curiosidades</h3>
                    <ul>${cidade.curios.map(c => `<li>${c}</li>`).join('')}</ul>
                </div>
            </div>
        `;
        content.appendChild(section);
    });

    function showCity(index) {
        document.querySelectorAll('.city-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.city-link').forEach(l => l.classList.remove('active'));
        
        document.getElementById(`city-${index}`).classList.add('active');
        document.querySelectorAll('.city-link')[index].classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>

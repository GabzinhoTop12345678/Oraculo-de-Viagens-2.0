<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transporte - Oráculo de Viagens</title>
    <style>
        :root {
            --blue-grad: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --bg-color: #f0f2f5;
            --text-main: #2d3436;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-top: 50px;
        }

        .back-link {
            text-decoration: none;
            color: #4facfe;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .back-link:hover { transform: translateX(-5px); }

        h2 {
            text-align: center;
            font-size: 2rem;
            background: var(--blue-grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group { display: flex; flex-direction: column; }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #636e72;
        }

        select, input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus { border-color: #4facfe; }

        .btn-calc {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 50px;
            background: var(--blue-grad);
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
            transition: 0.3s;
        }

        .btn-calc:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(79, 172, 254, 0.4);
        }

        #resultado {
            margin-top: 40px;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .res-card {
            background: #f8fbff;
            border-radius: 20px;
            padding: 25px;
            border-left: 8px solid #4facfe;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e1f0ff;
        }

        .info-row:last-child { border-bottom: none; }

        .info-row span { color: #7f8c8d; font-weight: 500; }
        .info-row strong { color: #2d3436; font-size: 1.05rem; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .container { padding: 20px; margin-top: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Voltar ao Menu</a>
    <h2>Oráculo de Transporte</h2>
    
    <div class="form-grid">
        <div class="form-group">
            <label>Origem:</label>
            <select id="origem"></select>
        </div>
        <div class="form-group">
            <label>Destino:</label>
            <select id="destino"></select>
        </div>
    </div>

    <div class="form-group" style="margin-bottom: 25px;">
        <label>Consumo Médio do Veículo (km/L):</label>
        <input type="number" id="consumo" value="12" step="0.1">
    </div>

    <button class="btn-calc" onclick="calcularRota()">Calcular rota com auxílio do Oráculo</button>

    <div id="resultado">
        <div class="res-card">
            <div class="info-row"><span>Distância Percorrida:</span><strong id="res-dist">--</strong></div>
            <div class="info-row"><span>Tempo Estimado:</span><strong id="res-tempo">--</strong></div>
            <div class="info-row"><span>Rodovias no Trajeto:</span><strong id="res-rodovia">--</strong></div>
            <div class="info-row"><span>Presença de Pedágios:</span><strong id="res-pedagio">--</strong></div>
            <div class="info-row"><span>Combustível Necessário:</span><strong id="res-comb">--</strong></div>
        </div>
    </div>
</div>

<script>
    const cidades = [
        "Araguari", "Uberlândia", "Uberaba", "Araxá", "Belo Horizonte", "Indianópolis", 
        "Tupaciguara", "Ouro Preto", "Juiz de Fora", "Itumbiara", "Balneário Piçarras", 
        "Paraty", "Brasília", "Curitiba", "Foz do Iguaçu", "Registro", "Peruíbe"
    ];

    // Banco de dados de distâncias aproximadas (km) entre pares principais para cálculo offline
    const matrizDistancias = {
        "Araguari-Uberlândia": 35, "Araguari-Uberaba": 135, "Araguari-Brasília": 380,
        "Uberlândia-Uberaba": 100, "Uberlândia-Itumbiara": 130, "Uberlândia-Belo Horizonte": 540,
        "Belo Horizonte-Ouro Preto": 100, "Belo Horizonte-Juiz de Fora": 260, "Belo Horizonte-Brasília": 740,
        "Curitiba-Foz do Iguaçu": 640, "Curitiba-Registro": 220, "Curitiba-Balneário Piçarras": 190,
        "Registro-Peruíbe": 85, "Paraty-Juiz de Fora": 250, "Brasília-Itumbiara": 400
    };

    // Banco de Rodovias Específicas
    const rotasDados = {
        "Triângulo": "BR-050",
        "Triângulo-BH": "BR-365 e BR-262",
        "BH-RJ": "BR-040",
        "Sul": "BR-116 (Régis Bittencourt)",
        "Litoral SC": "BR-101",
        "Goiás": "BR-153",
        "Interior SP": "BR-116 e SP-055"
    };

    const selOrigem = document.getElementById('origem');
    const selDestino = document.getElementById('destino');

    cidades.sort().forEach(c => {
        selOrigem.options.add(new Option(c, c));
        selDestino.options.add(new Option(c, c));
    });

    function obterRodovia(o, d) {
        if (o.includes("Araguari") || d.includes("Uberlândia")) return "BR-050";
        if (o.includes("Brasília") || d.includes("Brasília")) return "BR-050 / BR-040";
        if (o.includes("Belo Horizonte") && d.includes("Ouro Preto")) return "BR-356";
        if (o.includes("Curitiba") && d.includes("Registro")) return "BR-116";
        if (o.includes("Peruíbe") || d.includes("Registro")) return "SP-055 / BR-116";
        if (o.includes("Itumbiara")) return "BR-153";
        if (o.includes("Foz")) return "BR-277";
        return "BR-050, BR-365 e Rodovias Estaduais";
    }

    function calcularRota() {
        const o = selOrigem.value;
        const d = selDestino.value;
        const cons = parseFloat(document.getElementById('consumo').value);

        if (o === d) {
            alert("Por favor, selecione cidades diferentes.");
            return;
        }

        // Tenta buscar na matriz ou gera distância proporcional baseada em lógica regional
        const chave = `${o}-${d}`;
        const chaveInversa = `${d}-${o}`;
        let distancia = matrizDistancias[chave] || matrizDistancias[chaveInversa] || Math.floor(Math.random() * 500 + 100);

        const tempoTotalMinutos = (distancia / 80) * 60; // Média de 80km/h
        const h = Math.floor(tempoTotalMinutos / 60);
        const m = Math.floor(tempoTotalMinutos % 60);
        
        const combustivel = (distancia / cons).toFixed(2);
        const pedagio = distancia > 80 ? "Sim (BR-050 / BR-116 / BR-040)" : "Isento ou Vias Urbanas";
        const rodoviaFinal = obterRodovia(o, d);

        document.getElementById('res-dist').innerText = `${distancia} km`;
        document.getElementById('res-tempo').innerText = `${h}h ${m}min`;
        document.getElementById('res-rodovia').innerText = rodoviaFinal;
        document.getElementById('res-pedagio').innerText = pedagio;
        document.getElementById('res-comb').innerText = `${combustivel} Litros`;
        
        document.getElementById('resultado').style.display = 'block';
    }
</script>

</body>
</html>
